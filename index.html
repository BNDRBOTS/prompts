<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prompt Vault</title>
  <style>
    :root{
      --bg: #0b0b0f;
      --card2: rgba(0,0,0,.22);
      --border: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --muted2: rgba(255,255,255,.45);
      --shadow: 0 18px 44px rgba(0,0,0,.62);
      --radius: 18px;
      --radius2: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(1100px 600px at 18% -10%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(900px 600px at 85% 0%, rgba(255,255,255,.04), transparent 60%),
        var(--bg);
      padding: 28px 16px 60px;
    }

    .bg-noise{
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .06;
      mix-blend-mode: overlay;
      background:
        repeating-radial-gradient(circle at 20% 10%, rgba(255,255,255,.8) 0 1px, transparent 1px 3px),
        repeating-radial-gradient(circle at 70% 60%, rgba(255,255,255,.6) 0 1px, transparent 1px 4px);
      filter: blur(.4px);
    }

    .topbar{
      max-width: 1040px;
      margin: 0 auto 14px auto;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 18px;
    }

    .brand__kicker{
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .3px;
      color: var(--muted2);
      user-select:none;
    }

    .brand__title{
      margin-top: 8px;
      font-weight: 650;
      letter-spacing: .2px;
      line-height: 1.02;
      font-size: clamp(28px, 4.2vw, 54px);
    }
    .brand__title span{ display:inline-block; padding-right: .12em; }

    .topbar__right{
      display:flex;
      align-items:flex-end;
      gap: 14px;
    }

    .scrollpct{
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted2);
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,.02);
      user-select:none;
    }

    .controls{ display:flex; gap: 10px; align-items:center; }

    .input{
      width: min(360px, 56vw);
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      color: var(--text);
      outline: none;
      font-family: var(--mono);
      font-size: 13px;
    }
    .input::placeholder{ color: rgba(255,255,255,.38); }

    .btn{
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      cursor:pointer;
    }
    .btn:hover{ background: rgba(255,255,255,.04); color: rgba(255,255,255,.86); }

    .tags{
      max-width: 1040px;
      margin: 16px auto 16px auto;
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag{
      font-family: var(--mono);
      font-size: 12px;
      padding: 9px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      cursor:pointer;
      user-select:none;
    }
    .tag:hover{ background: rgba(255,255,255,.04); color: rgba(255,255,255,.86); }
    .tag.is-active{ background: rgba(255,255,255,.08); color: rgba(255,255,255,.92); }

    .wrap{ max-width: 1040px; margin: 0 auto; }

    .count{
      margin: 10px 0 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted2);
    }

    .grid{ display:grid; gap: 16px; }

    .code-card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transform: translateY(0);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .code-card:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    .code-card__header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 14px 16px 10px 16px;
      gap: 12px;
    }

    .code-card__left{
      display:flex;
      align-items:baseline;
      gap: 10px;
      min-width: 0;
    }

    .code-card__lang{
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted2);
      letter-spacing: .2px;
      user-select:none;
    }

    .code-card__title{
      font-family: var(--mono);
      font-size: 13px;
      color: rgba(255,255,255,.78);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .code-card__actions{ display:flex; gap: 8px; align-items:center; }

    .copy{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      user-select:none;
      transition: background .15s ease, border-color .15s ease, color .15s ease, transform .05s ease;
    }
    .copy:hover{
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.07);
      color: rgba(255,255,255,.82);
    }
    .copy:active{ transform: translateY(1px); }
    .copy svg{ width: 16px; height: 16px; opacity: .9; }
    .copy.is-copied{ color: rgba(120,255,170,.92); }

    .code-card__body{ padding: 0 16px 16px 16px; }

    pre{
      margin:0;
      padding: 14px 14px;
      background: var(--card2);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius2);
      overflow:auto;
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      white-space: pre;
      tab-size: 2;
    }

    pre::-webkit-scrollbar{ height: 10px; width: 10px; }
    pre::-webkit-scrollbar-thumb{ background: rgba(255,255,255,.12); border-radius: 999px; }
    pre::-webkit-scrollbar-track{ background: rgba(255,255,255,.04); border-radius: 999px; }

    .legal-footer {
      max-width: 1040px;
      margin: 40px auto 0;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 16px;
      justify-content: center;
      font-family: var(--mono);
      font-size: 12px;
    }
    .legal-footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .legal-footer a:hover {
      color: var(--text);
    }

    @media (max-width: 720px){
      .topbar{ flex-direction: column; align-items: flex-start; }
      .topbar__right{ width: 100%; justify-content: space-between; }
      .input{ width: 62vw; }
      .copy span{ display:none; }
    }
  </style>
</head>

    const $ = (s) => document.querySelector(s);

    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopy(text);
        }
      } catch {
        fallbackCopy(text);
      }
    }

    function padPct(n){
      const s = String(n);
      return s.length === 1 ? `0${s}` : s;
    }

    function updateScrollPct(){
      const el = $("#scrollPct");
      const doc = document.documentElement;
      const max = doc.scrollHeight - window.innerHeight;
      const pct = max <= 0 ? 0 : Math.round((window.scrollY / max) * 100);
      el.textContent = `${padPct(Math.max(0, Math.min(100, pct)))}%`;
    }

    function normalize(s){ return (s || "").toLowerCase().trim(); }

    let activeTag = "All";

    function getQueryState(){
      const u = new URL(window.location.href);
      return {
        q: u.searchParams.get("q") || "",
        tag: u.searchParams.get("tag") || "All",
      };
    }

    function setQueryState({ q, tag }){
      const u = new URL(window.location.href);
      if (q) u.searchParams.set("q", q); else u.searchParams.delete("q");
      if (tag && tag !== "All") u.searchParams.set("tag", tag); else u.searchParams.delete("tag");
      
      try {
        history.replaceState(null, "", u.toString());
      } catch (err) {
        console.warn("History API prevented by sandbox environment.", err);
      }
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function renderTags(){
      const tagsEl = $("#tags");
      const tags = new Set(["All"]);
      PROMPTS.forEach(p => (p.tags || []).forEach(t => tags.add(t)));

      tagsEl.innerHTML = "";
      [...tags].forEach(t => {
        const b = document.createElement("button");
        b.className = `tag${t === activeTag ? " is-active" : ""}`;
        b.type = "button";
        b.textContent = t;
        b.addEventListener("click", () => {
          activeTag = t;
          const q = $("#q").value || "";
          setQueryState({ q, tag: activeTag });
          render();
          renderTags();
        });
        tagsEl.appendChild(b);
      });
    }

    function cardTemplate(p){
      const safeId = p.id || crypto.randomUUID();
      const title = p.title || "Untitled";
      const lang = p.lang || "text";
      const body = p.body || "";

      return `
        <section class="code-card" id="${safeId}" data-code-card>
          <header class="code-card__header">
            <div class="code-card__left">
              <span class="code-card__lang">${lang}</span>
              <span class="code-card__title">${title}</span>
            </div>

            <div class="code-card__actions">
              <button class="copy" type="button" data-prompt-btn aria-label="Copy prompt">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M9 6h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M7 18H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span data-prompt-label>Copy Prompt</span>
              </button>
            </div>
          </header>

          <div class="code-card__body">
            <pre><code data-code>${escapeHtml(body)}</code></pre>
          </div>
        </section>
      `;
    }

    function wireCardEvents(root){
      root.querySelectorAll("[data-code-card]").forEach(card => {
        const promptBtn = card.querySelector("[data-prompt-btn]");
        const codeEl = card.querySelector("[data-code]");
        const promptLabel = card.querySelector("[data-prompt-label]");

        promptBtn.addEventListener("click", async () => {
          await copyText(codeEl.textContent);
          const old = promptLabel.textContent;
          promptLabel.textContent = "Copied";
          promptBtn.classList.add("is-copied");
          setTimeout(() => { promptLabel.textContent = old; promptBtn.classList.remove("is-copied"); }, 1100);
        });
      });
    }

    function render(){
      const grid = $("#grid");
      const count = $("#count");
      const q = normalize($("#q").value);

      const filtered = PROMPTS.filter(p => {
        const inTag = activeTag === "All" || (p.tags || []).includes(activeTag);
        if (!inTag) return false;
        if (!q) return true;
        const hay = normalize(`${p.title || ""}\n${p.body || ""}\n${(p.tags || []).join(" ")}`);
        return hay.includes(q);
      });

      count.textContent = `${filtered.length} / ${PROMPTS.length} prompts`;
      grid.innerHTML = filtered.map(cardTemplate).join("");
      wireCardEvents(grid);
    }

    function init(){
      const state = getQueryState();
      activeTag = state.tag || "All";

      $("#q").value = state.q || "";
      $("#q").addEventListener("input", () => {
        setQueryState({ q: $("#q").value, tag: activeTag });
        render();
      });

      $("#clear").addEventListener("click", () => {
        $("#q").value = "";
        activeTag = "All";
        setQueryState({ q: "", tag: "All" });
        renderTags();
        render();
      });

      renderTags();
      render();

      updateScrollPct();
      window.addEventListener("scroll", updateScrollPct, { passive: true });

      if (location.hash) {
        const el = document.querySelector(location.hash);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
