<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNDR.OS | Professional Command Center</title>

    <!-- Typography: Plus Jakarta Sans (Aeonik Proxy) & Archivo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           BASE TOKENS (STRICT COLOR ADHERENCE & WCAG ALIGNMENT)
           ========================================================================== */
        :root {
            /* Palette: Tan Bone & Medium Dark Charcoal */
            --color-bone: #E3DFD5;
            --color-bone-dark: #D8D3C8;
            --color-charcoal: #2F2E2C; 
            
            /* WCAG Contrast Mappings */
            --text-on-bone: #111111;
            --text-muted-on-bone: #555555;
            
            --text-on-charcoal: #E3DFD5;
            --text-muted-on-charcoal: #999896;

            /* Mapped Tokens */
            --bg-base: var(--color-bone);
            --bg-card: var(--color-charcoal);
            
            --border-base: rgba(0, 0, 0, 0.08);
            --border-card: #42403E; 
            --border-hover: rgba(255, 255, 255, 0.3);
            
            /* Specific Accents */
            --color-magenta: #ff0055;
            --color-plasma: #CCFF00;
            --dot-glow: var(--color-plasma); 
            --check-glow: var(--color-bone);
            --canvas-inner: var(--color-bone-dark); 
            
            /* Nav Pill Tokens */
            --radius-pill: 99px;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);

            /* Footer Tokens */
            --void: #020202;
            --bone: #E8E4DF;
            --plasma: #CCFF00;
            --c-li: #0077b5; --c-ss: #ff6719; --c-gh: #ffffff; --c-ig: #e4405f;
            --c-fb: #1877f2; --c-bc: #FFDD00; --c-gr: #ff0055; --c-pb: #3b82f6;
            --f-h: 56px; 
            --f-ease: cubic-bezier(0.16, 1, 0.3, 1);

            /* Typography Logic */
            --font-aeonik: 'Plus Jakarta Sans', sans-serif;
            --font-label: 'Archivo', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;

            /* Spacing (8px baseline) */
            --space-2: 0.5rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-12: 3rem;
            --space-16: 4rem;

            /* Grid Configuration */
            --grid-gap: 24px;
            --card-min-width: 340px;
        }

        /* ==========================================================================
           BASE STYLES & ACCESSIBILITY RESETS
           ========================================================================== */
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html {
            background-color: var(--bg-base);
            color: var(--text-on-bone);
            font-family: var(--font-aeonik);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Standardized Focus Rings for Accessibility Compliance */
        *:focus-visible {
            outline: 2px solid var(--text-on-bone);
            outline-offset: 2px;
        }

        /* Enforced Touch Native Feel - Selectable boundaries */
        a, button, .vitamin-btn, #mobile-nav-toggle, .grid-card, .f-belt a, .f-util {
            -webkit-user-select: none;
            user-select: none;
        }

        /* ==========================================================================
           STATIC SPATIAL FX
           ========================================================================== */
        .spatial-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: none;
            pointer-events: none;
        }

        /* ==========================================================================
           GLOBAL HEADER (SLIM OS BAR)
           ========================================================================== */
        .global-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 90;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-bottom: none;
            padding: 0;
            display: flex;
            align-items: flex-start;
            pointer-events: none; 
        }

        .brand-logo {
            pointer-events: auto; 
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: max(24px, env(safe-area-inset-top)) 0 0 max(24px, env(safe-area-inset-left));
        }
        
        .brand-logo img {
            height: 64px; 
            width: auto;
            display: block;
            mix-blend-mode: multiply;
            transition: opacity 0.2s ease;
        }
        
        .brand-logo:hover img {
            opacity: 0.7;
        }

        @media (min-width: 1024px) {
            .global-header {
                padding: 0;
            }
            .brand-logo {
                padding: max(24px, env(safe-area-inset-top)) 0 0 max(32px, env(safe-area-inset-left));
            }
            .brand-logo img {
                height: 96px; 
            }
        }

        /* ==========================================================================
           MAIN SITE NAV PILL OVERLAY
           ========================================================================== */
        .nav-pill {
            position: fixed;
            top: max(24px, env(safe-area-inset-top));
            right: max(24px, env(safe-area-inset-right));
            transform: translate3d(0, -20px, 0);
            opacity: 0;
            background: rgba(227, 223, 213, 0.95);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-pill);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px;
            z-index: 101; 
            box-shadow: 0 16px 40px -8px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255,255,255,0.5);
            transition: transform 0.6s var(--ease-out-expo), opacity 0.6s var(--ease-out-expo), border-radius 0.6s var(--ease-premium), width 0.6s var(--ease-premium), box-shadow 0.6s var(--ease-premium);
        }
        .nav-pill::-webkit-scrollbar { display: none; }
        .nav-pill.is-loaded { transform: translate3d(0, 0, 0); opacity: 1; }
        .nav-pill.hidden { transform: translate3d(0, -120%, 0); opacity: 0; pointer-events: none; }

        .nav-pill a.route-btn {
            color: var(--text-on-bone);
            text-decoration: none;
            font-size: 11px;
            font-family: var(--font-aeonik);
            font-weight: 700;
            font-style: normal;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.4s var(--ease-out-expo);
            position: relative;
            min-height: 44px; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .nav-pill a.route-btn::after {
            content: ''; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; z-index: -1;
        }
        .nav-pill a.route-btn:focus-visible, .nav-pill a.route-btn:active {
            background: var(--color-plasma); color: var(--color-charcoal);
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.3); outline: none;
        }
        @media (hover: hover) {
            .nav-pill a.route-btn:hover {
                background: var(--color-plasma); color: var(--color-charcoal);
                box-shadow: 0 0 20px rgba(204, 255, 0, 0.3); outline: none; transform: scale(1.02);
            }
        }

        /* Nav Desktop */
        @media (min-width: 800px) {
            .nav-pill {
                max-width: calc(100vw - 240px); 
                flex-wrap: wrap; 
                justify-content: flex-end; 
                overflow: hidden; 
                border-radius: 24px; 
                padding: 6px 12px;
            }
            .nav-pill a.route-btn {
                flex: 0 0 auto;
                padding: 8px 12px;
                font-size: 9.5px; 
                letter-spacing: 0.08em;
                min-height: unset;
                margin: 2px; 
            }
            #mobile-nav-toggle { display: none; }
            .nav-items-wrapper { display: contents; }
            .nav-items-inner { display: contents; }
        }

        /* Nav Mobile */
        @media (max-width: 799px) {
            .nav-pill {
                right: max(24px, env(safe-area-inset-right));
                left: auto;
                transform: translate3d(0, -20px, 0);
                flex-direction: column;
                background: var(--color-bone);
                min-width: auto;
                padding: 4px;
                border-radius: 32px;
                box-shadow: 0 16px 40px -8px rgba(0, 0, 0, 0.2);
                width: auto;
                max-width: calc(100vw - 120px); 
                align-items: flex-end; 
            }
            .nav-pill.is-loaded { transform: translate3d(0, 0, 0); opacity: 1; }
            .nav-pill.hidden { transform: translate3d(0, -120%, 0); opacity: 0; }
            
            .nav-pill.is-open {
                width: 220px; 
                border-radius: 20px;
                box-shadow: 0 24px 60px -12px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.8);
            }

            #mobile-nav-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                width: auto;
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 100%), var(--color-bone);
                color: var(--text-on-bone);
                padding: 8px 24px;
                border-radius: 32px;
                font-family: var(--font-aeonik);
                font-weight: 800;
                font-size: 13px;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                min-height: 44px; 
                border: 1px solid var(--border-base); 
                box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.9), 0 4px 12px -2px rgba(0, 0, 0, 0.15);
                cursor: pointer;
                transition: all 0.4s var(--ease-premium);
            }
            .nav-pill.is-open #mobile-nav-toggle {
                width: 100%; 
                background: rgba(0, 0, 0, 0.03);
                box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.08);
                border-color: rgba(0, 0, 0, 0.05);
                margin-bottom: 8px;
            }

            #mobile-nav-toggle .toggle-text-close { display: none; }
            .nav-pill.is-open #mobile-nav-toggle .toggle-text-start { display: none; }
            .nav-pill.is-open #mobile-nav-toggle .toggle-text-close { display: block; }
            
            .nav-items-wrapper {
                display: grid;
                grid-template-rows: 0fr;
                transition: grid-template-rows 0.6s var(--ease-premium);
                width: 100%;
            }
            .nav-pill.is-open .nav-items-wrapper {
                grid-template-rows: 1fr;
            }
            
            .nav-items-inner {
                overflow: hidden;
                display: flex;
                flex-direction: column;
                gap: 4px;
                padding: 0 4px;
            }
            .nav-pill.is-open .nav-items-inner {
                padding-bottom: 8px;
                max-height: 60vh;
                overflow-y: auto;
                overscroll-behavior: contain;
            }
            
            .nav-pill a.route-btn {
                width: 100%;
                padding: 16px 20px;
                margin: 0;
                text-align: center;
                border-radius: 12px;
                font-size: 13px;
            }
        }

        /* ==========================================================================
           LAYOUT & GRID ALIGNMENT
           ========================================================================== */
        .main-container {
            padding: max(100px, env(safe-area-inset-top)) var(--space-4) var(--space-16);
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 1024px) {
            .main-container {
                padding: 140px var(--space-8) var(--space-16);
            }
        }

        .category-block {
            margin-bottom: var(--space-16);
            scroll-margin-top: 100px; 
        }

        .category-header {
            margin-bottom: var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-4);
            width: 100%;
        }

        .category-header::after { 
            content: ''; 
            flex-grow: 1; 
            height: 1px; 
            background: linear-gradient(90deg, rgba(0,0,0,0.1) 0%, transparent 100%); 
        }

        .section-badge {
            position: relative; display: inline-flex; align-items: center; gap: 12px;
            padding: 10px 24px 10px 18px; font-size: 11px; font-weight: 800;
            font-family: var(--font-aeonik);
            letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-on-bone); z-index: 1; border-radius: 4px;
        }

        .section-badge::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-base); transform: skewX(-12deg); z-index: -1; border-radius: 3px;
            box-shadow: 0 8px 20px -4px rgba(0,0,0,0.1); border: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        @keyframes magenta-pulse { 
            0%, 100% { box-shadow: 0 0 12px rgba(255, 0, 85, 0.5), 0 0 20px rgba(255, 0, 85, 0.3); opacity: 1; } 
            50% { box-shadow: 0 0 16px rgba(255, 0, 85, 0.7), 0 0 28px rgba(255, 0, 85, 0.5); opacity: 0.7; } 
        }

        @keyframes plasma-pulse { 
            0%, 100% { box-shadow: 0 0 12px rgba(204, 255, 0, 0.5), 0 0 20px rgba(204, 255, 0, 0.3); opacity: 1; } 
            50% { box-shadow: 0 0 16px rgba(204, 255, 0, 0.7), 0 0 28px rgba(204, 255, 0, 0.5); opacity: 0.7; } 
        }
        
        .section-badge::after {
            content: ''; width: 6px; height: 6px; background: var(--color-magenta); border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.5), 0 0 20px rgba(255, 0, 85, 0.3); order: -1; animation: magenta-pulse 3s infinite ease-in-out;
        }

        .module-count {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted-on-bone);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .strict-grid {
            display: grid;
            /* Constraint to prevent mobile viewport overflow */
            grid-template-columns: repeat(auto-fill, minmax(min(100%, var(--card-min-width)), 1fr));
            gap: var(--grid-gap);
            align-items: stretch;
        }

        /* ==========================================================================
           PREVIEW CARDS (FAST & ACCESSIBLE)
           ========================================================================== */
        .grid-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            height: 380px; 
            position: relative;
        }

        .grid-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            z-index: 2;
        }

        .grid-card:focus-visible {
            outline: 3px solid var(--text-on-bone);
            outline-offset: 4px;
            z-index: 3;
        }

        .card-meta {
            padding: var(--space-4);
            border-bottom: 1px solid var(--border-card);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: var(--bg-card);
            z-index: 10;
        }

        .url-text {
            font-family: var(--font-aeonik);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted-on-charcoal);
            word-break: break-all;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .state-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--dot-glow);
            box-shadow: 0 0 12px rgba(204, 255, 0, 0.5), 0 0 20px rgba(204, 255, 0, 0.3);
            flex-shrink: 0;
            margin-top: 4px;
            animation: plasma-pulse 3s infinite ease-in-out;
        }

        .preview-window {
            flex-grow: 1;
            position: relative;
            background: var(--canvas-inner);
            overflow: hidden;
        }

        .loader-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transition: opacity 0.5s ease;
        }
        
        .loader-text {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-on-charcoal);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: var(--bg-card);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-card);
        }

        .live-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            transform: scale(0.5);
            transform-origin: top left;
            border: none;
            pointer-events: none; 
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 2;
            background: #ffffff;
        }

        .live-iframe.is-loaded {
            opacity: 1;
        }

        .preview-window:has(.live-iframe.is-loaded) .loader-pattern {
            opacity: 0;
        }

        .card-action {
            padding: var(--space-4);
            border-top: 1px solid var(--border-card);
            background: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .action-label {
            font-family: var(--font-label);
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-on-charcoal);
        }

        .action-arrow {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--check-glow);
            stroke-width: 2;
            filter: drop-shadow(0 0 4px rgba(227, 223, 213, 0.4));
            transition: stroke 0.2s ease, transform 0.2s ease;
        }

        .grid-card:hover .action-arrow {
            transform: translateX(4px);
        }

        /* ==========================================================================
           BNDR FOOTER
           ========================================================================== */
        #bndr-base-footer {
            background: var(--void);
            color: var(--bone);
            border-top: 1px solid rgba(255,255,255,0.08);
            font-family: 'Inter', var(--font-aeonik), sans-serif;
            position: relative;
            z-index: 9998;
            width: 100%;
            box-sizing: border-box;
            margin-top: auto;
        }

        .f-layout {
            max-width: 1300px;
            margin: 0 auto;
            height: var(--f-h);
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1.2fr 3.2fr 1.6fr 1fr;
            align-items: center;
            gap: 16px;
        }

        .f-axis-legal { display: flex; flex-direction: column; gap: 2px; }
        .f-row { display: flex; gap: 12px; }
        .f-axis-legal a { 
            font-size: 9px; font-weight: 700; color: var(--bone); 
            text-decoration: none; opacity: 0.5; transition: 0.2s var(--f-ease);
            padding: 12px; /* Expanding touch box */
            margin: -12px; 
        }
        .f-axis-legal a:hover { opacity: 1; color: var(--plasma); }

        .f-belt { display: flex; gap: 16px; justify-content: center; }
        .f-belt a {
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; 
            transition: transform 0.2s var(--f-ease);
        }
        .f-belt svg { width: 16px; height: 16px; transition: 0.3s; opacity: 0.85; }
        
        .f-belt a:hover { transform: translateY(-2px); }
        .f-belt a:hover svg { opacity: 1; filter: url(#fizzle-physics); }
        
        .f-belt .li svg { fill: var(--c-li); }
        .f-belt .ss svg { fill: var(--c-ss); }
        .f-belt .gh svg { fill: var(--c-gh); }
        .f-belt .ig svg { fill: var(--c-ig); }
        .f-belt .fb svg { fill: var(--c-fb); }
        .f-belt .bc svg { fill: var(--c-bc); }
        .f-belt .gr svg { fill: var(--c-gr); }
        .f-belt .pb svg { fill: var(--c-pb); }

        .f-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .f-util {
            font-size: 10px; font-weight: 800; letter-spacing: 0.05em;
            text-decoration: none; color: var(--bone);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px; border-radius: 4px;
            transition: 0.2s; cursor: pointer; background: transparent;
            white-space: nowrap; text-transform: uppercase;
        }
        .f-util:hover, .f-util:active { background: var(--bone); color: var(--void); }

        .f-meta { text-align: right; }
        .f-time { font-family: monospace; font-size: 10px; font-weight: 700; color: var(--bone); margin-bottom: 2px; }
        .f-copy { font-size: 8px; font-weight: 600; opacity: 0.3; text-transform: uppercase; }

        @media (max-width: 1100px) {
            #bndr-base-footer { height: auto; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
            .f-layout { 
                grid-template-columns: 1fr; height: auto; 
                padding: 20px 16px; gap: 20px; 
            }
            .f-belt { flex-wrap: wrap; gap: 16px; order: 1; justify-content: space-evenly; }
            .f-belt a { width: 44px; height: 44px; } 
            .f-belt svg { width: 24px; height: 24px; }
            
            .f-axis-legal { order: 2; align-items: center; text-align: center; gap: 4px; }
            .f-actions { order: 3; justify-content: center; gap: 12px; }
            .f-util { padding: 14px 20px; font-size: 11px; } 
            
            .f-meta { order: 4; text-align: center; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        }

        /* ==========================================================================
           DONATE / SUPPORT BUTTONS (3D OVAL VITAMIN)
           ========================================================================== */
        .vitamin-btn {
            background: linear-gradient(180deg, #9670f5 0%, #764ce5 100%);
            border: 1px solid #5a32c2;
            color: #ffffff !important;
            border-radius: 999px; 
            padding: 10px 24px;
            font-family: var(--font-aeonik);
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
            box-shadow: 
                inset 0 1.5px 1px rgba(255, 255, 255, 0.4),

        const previewWindows = document.querySelectorAll('.grid-card');
        const requestIdle = window.requestIdleCallback || function(cb) { setTimeout(cb, 1); };
        
        const previewObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const targetWindow = entry.target.querySelector('.preview-window');
                if (entry.isIntersecting) {
                    if (!targetWindow.querySelector('.live-iframe')) {
                        requestIdle(() => {
                            if (!entry.isIntersecting) return; 
                            const iframe = document.createElement('iframe');
                            iframe.className = 'live-iframe';
                            iframe.loading = 'lazy';
                            iframe.sandbox = 'allow-scripts allow-same-origin';
                            iframe.src = entry.target.dataset.url;
                            iframe.onload = () => iframe.classList.add('is-loaded');
                            targetWindow.appendChild(iframe);
                        });
                    }
                } else {
                    const existingIframe = targetWindow.querySelector('.live-iframe');
                    if (existingIframe) existingIframe.remove();

                clearTimeout(scrollEndTimer);
                const currentScroll = window.scrollY;
                
                if (currentScroll > 150 && currentScroll > lastScroll) {
                    navPill.classList.add('hidden');
                } else {
                    navPill.classList.remove('hidden');
                }
                lastScroll = currentScroll;
            }, { passive: true });

            const dockContainer = document.getElementById('dock-container');
            const footerElement = document.getElementById('bndr-base-footer');
            
            if (dockContainer && footerElement) {
                let ticking = false;
                const updateDock = () => {
                    const footerRect = footerElement.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    
                    if (footerRect.top < viewportHeight) {
                        const overlap = viewportHeight - footerRect.top;
                        dockContainer.style.transform = `translateY(-${overlap}px)`;
                    } else {
                        dockContainer.style.transform = 'translateY(0)';
                    }
                    ticking = false;
                };
                
                const onScroll = () => {
                    if (!ticking) {
                        window.requestAnimationFrame(updateDock);
                        ticking = true;
                    }
                };
                
                window.addEventListener('scroll', onScroll, { passive: true });
                window.addEventListener('resize', onScroll, { passive: true });
                updateDock();
            }
        });
    </script>

<style>
  @media (pointer: coarse) {
      * { cursor: auto !important; }
      #point-cursor-container { display: none !important; }
  }

  @media (pointer: fine) {
      * { cursor: none !important; }
      
      #point-cursor-container {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 999999;
        mix-blend-mode: difference;
        will-change: transform;
        transition: transform 0.08s ease-out;
      }

      .point-shape {
        display: block;
        width: 14px;
        height: 14px;
        transform-origin: center center;
        filter: url(#point-glow);
        transition: transform 0.25s ease;
      }

      .rotating .point-shape {
        animation: point-spin 1.2s linear infinite;
      }
  }

  @keyframes point-spin {
    to { transform: rotate(360deg); }
  }
</style>

<svg width="0" height="0" style="position:absolute;display:none;">
  <defs>
    <filter id="point-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>

<script>
  (function () {
    if (window.matchMedia("(pointer: coarse)").matches || ('ontouchstart' in window)) return;

    const HEX_LIST = ['#E8E4DF', '#404040', '#CCFF00', '#FF0055']; 

    const pointSVG = `
      <svg class="point-shape" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,0 62,38 100,50 62,62 50,100 38,62 0,50 38,38" fill="var(--cursor-color, white)" />
      </svg>`;

    const container = document.createElement('div');
    container.id = 'point-cursor-container';
    container.innerHTML = pointSVG;
    document.body.appendChild(container);

    function hexToRgb(hex) {
      const bigint = parseInt(hex.slice(1), 16);
      return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
    }
    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(c => Math.round(c).toString(16).padStart(2, '0')).join('');
    }
    function lerp(a, b, t) {
      return a + (b - a) * t;
    }
    function interpolateHex(hex1, hex2, t) {
      const c1 = hexToRgb(hex1);
      const c2 = hexToRgb(hex2);
      return rgbToHex(
        lerp(c1.r, c2.r, t),
        lerp(c1.g, c2.g, t),
        lerp(c1.b, c2.b, t)
      );
    }

    const cycleDuration = 1200; 
    let startTime = performance.now();
    function morphColour() {
      const now = performance.now();
      const elapsed = now - startTime;
      const segmentCount = HEX_LIST.length;
      const totalTime = segmentCount * cycleDuration;
      const scaledT = (elapsed % totalTime) / totalTime; 

      const segmentFloat = scaledT * segmentCount;
      const idx = Math.floor(segmentFloat);
      const t = segmentFloat - idx;
      const from = HEX_LIST[idx % segmentCount];
      const to = HEX_LIST[(idx + 1) % segmentCount];
      const hex = interpolateHex(from, to, t);
      container.style.setProperty('--cursor-color', hex);
      requestAnimationFrame(morphColour);
    }
    requestAnimationFrame(morphColour);

    let mouseX = -100, mouseY = -100;
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      container.style.transform = `translate(${mouseX - 7}px, ${mouseY - 7}px)`;

      const target = e.target;
      const interactive = target.closest(
        'a, button, input, select, textarea, [onclick], [role="button"], [tabindex]:not([tabindex="-1"])'
      );
      container.classList.toggle('rotating', !!interactive);
    });

    document.addEventListener('mouseover', (e) => {
      const interactive = e.target.closest(
        'a, button, input, select, textarea, [onclick], [role="button"], [tabindex]:not([tabindex="-1"])'
      );
      if (interactive) container.classList.add('rotating');
    });
    document.addEventListener('mouseout', (e) => {
      const interactive = e.target.closest(
        'a, button, input, select, textarea, [onclick], [role="button"], [tabindex]:not([tabindex="-1"])'
      );
      if (!interactive) container.classList.remove('rotating');
    });
    document.addEventListener('mouseleave', () => container.style.opacity = '0');
    document.addEventListener('mouseenter', () => container.style.opacity = '1');
  })();
</script>

</body>
</html>
